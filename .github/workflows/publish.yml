name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Check tag matches pyproject.toml version
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          PYPROJECT_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="${GIT_TAG#v}"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "ERROR: Tag $GIT_TAG (version $TAG_VERSION) does not match pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi
          echo "Version match: $TAG_VERSION"

      - name: Run tests
        run: |
          uv sync --dev --all-extras
          uv run python -m pytest tests/unit/ -v --tb=short

  publish:
    name: Build & Publish
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
